name: Format lane executable verification

on:
  push:
    branches: [feature/lane-executable-verification]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/lane-executable-verification
          fetch-depth: 1

      - name: Format exact source
        shell: bash
        run: |
          set -Eeuo pipefail
          cargo fmt --all
          rm -f \
            .github/workflows/format-lane-executable.yml \
            .tmp/format-lane-executable \
            .tmp/format-lane-executable-2
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit formatted source
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style: format lane executable verification'
          git push origin HEAD:feature/lane-executable-verification
