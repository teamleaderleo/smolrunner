name: Fix typed lane command import

on:
  push:
    branches: [feature/typed-lane-commands]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/typed-lane-commands
          fetch-depth: 1

      - name: Remove unused module import
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/lane_command.rs')
          text = path.read_text(encoding='utf-8')
          old = 'use crate::process::{CommandSpec, CommandValue};\n'
          new = 'use crate::process::CommandSpec;\n'
          if text.count(old) != 1:
              raise SystemExit('module CommandValue import did not match exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          cargo fmt --all
          rm -f \
            .github/workflows/fix-lane-command-import.yml \
            .lane-command-clippy.txt \
            .tmp/capture-lane-command-clippy \
            .tmp/capture-lane-command-clippy-2 \
            .tmp/fix-lane-command-import
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'fix: remove unused lane command import'
          git push origin HEAD:feature/typed-lane-commands
