name: Seal state document API

on:
  push:
    branches: [feature/ownership-state-documents]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/ownership-state-documents
          fetch-depth: 1

      - name: Seal constructors and format
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/state_document.rs')
          text = path.read_text(encoding='utf-8')

          old = '''pub struct ProjectStateDocument {
              pub schema_version: u8,
              pub installation_id: InstallationId,
              pub project: ProjectIdentity,
          }

          impl ProjectStateDocument {
          '''
          new = '''pub struct ProjectStateDocument {
              schema_version: u8,
              installation_id: InstallationId,
              project: ProjectIdentity,
          }

          impl ProjectStateDocument {
              #[must_use]
              pub fn schema_version(&self) -> u8 {
                  self.schema_version
              }

              #[must_use]
              pub fn installation_id(&self) -> &InstallationId {
                  &self.installation_id
              }

              #[must_use]
              pub fn project(&self) -> &ProjectIdentity {
                  &self.project
              }

          '''
          if text.count(old) != 1:
              raise SystemExit('project document definition did not match exactly once')
          text = text.replace(old, new)

          old = '''pub struct ResourceStateDocument {
              pub schema_version: u8,
              pub marker: OwnershipMarker,
          }

          impl ResourceStateDocument {
          '''
          new = '''pub struct ResourceStateDocument {
              schema_version: u8,
              marker: OwnershipMarker,
          }

          impl ResourceStateDocument {
              #[must_use]
              pub fn schema_version(&self) -> u8 {
                  self.schema_version
              }

              #[must_use]
              pub fn marker(&self) -> &OwnershipMarker {
                  &self.marker
              }

          '''
          if text.count(old) != 1:
              raise SystemExit('resource document definition did not match exactly once')
          text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

          cargo fmt --all
          rm .github/workflows/seal-state-document-api.yml
          git diff --check

      - name: Commit bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'refactor: seal state document constructors'
          git push origin HEAD:feature/ownership-state-documents
