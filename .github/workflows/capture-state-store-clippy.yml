name: Capture state store Clippy

on:
  push:
    branches: [feature/state-store-contract]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/state-store-contract
          fetch-depth: 1

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --locked --all-targets --all-features --message-format=short -- -D warnings > .state-store-clippy.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> .state-store-clippy.txt
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          rm .github/workflows/capture-state-store-clippy.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore: capture state store Clippy diagnostics'
          git push origin HEAD:feature/state-store-contract
