name: PR 41 publication format

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/atomic-installation-publication
          fetch-depth: 1

      - name: Format only reviewed Rust sources
        shell: bash
        run: |
          set -Eeuo pipefail
          for path in \
            src/lib.rs \
            src/linux_installation_catalog_lock.rs \
            src/linux_installation_publication.rs
          do
            test -f "$path"
            test ! -L "$path"
          done
          test -z "$(git status --porcelain)"
          rustfmt --edition 2024 \
            src/lib.rs \
            src/linux_installation_catalog_lock.rs \
            src/linux_installation_publication.rs
          changed="$(git diff --name-only)"
          test -n "$changed"
          while IFS= read -r path; do
            case "$path" in
              src/lib.rs|src/linux_installation_catalog_lock.rs|src/linux_installation_publication.rs) ;;
              *) exit 1 ;;
            esac
          done <<< "$changed"
          git diff --check

      - name: Commit the bounded formatter result
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/lib.rs \
            src/linux_installation_catalog_lock.rs \
            src/linux_installation_publication.rs
          git commit -m 'style: format atomic installation publication'
          git push origin HEAD:feature/atomic-installation-publication
