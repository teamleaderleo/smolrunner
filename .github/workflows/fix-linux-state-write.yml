name: Fix Linux state write

on:
  push:
    branches: [feature/linux-state-write]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/linux-state-write
          fetch-depth: 1

      - name: Apply compiler-directed correction
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/linux_state.rs')
          text = path.read_text(encoding='utf-8')
          old = '    if filled.len() != random.len() {'
          new = '    if filled != random.len() {'
          if text.count(old) != 1:
              raise SystemExit('expected getrandom length expression exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          cargo fmt --all
          rm -f \
            .github/workflows/fix-linux-state-write.yml \
            .linux-state-write-check.txt \
            .tmp/check-linux-state-write \
            .tmp/fix-linux-state-write
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'fix: handle rustix random byte count'
          git push origin HEAD:feature/linux-state-write
