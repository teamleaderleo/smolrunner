name: PR 37 catalog format

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/installation-catalog-lookup
          fetch-depth: 1

      - name: Format only the catalog source
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f src/linux_installation_catalog.rs
          test ! -L src/linux_installation_catalog.rs
          before="$(git status --porcelain)"
          test -z "$before"
          rustfmt --edition 2024 src/linux_installation_catalog.rs
          changed="$(git diff --name-only)"
          test "$changed" = "src/linux_installation_catalog.rs"
          git diff --check

      - name: Commit the bounded formatter result
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/linux_installation_catalog.rs
          git diff --cached --quiet && exit 0
          git commit -m 'style: format installation catalog lookup'
          git push origin HEAD:feature/installation-catalog-lookup
