name: Apply staged canonical source

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out feature branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.head_ref }}

      - name: Apply exact staged source
        shell: bash
        run: |
          set -Eeuo pipefail
          tr -d '\n' < <(cat .tmp/canonical-source.part*) | base64 --decode > /tmp/canonical-source.tar.gz
          tar -xzf /tmp/canonical-source.tar.gz
          rm -rf .tmp .github/workflows/source-snapshot.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: define canonical resource evidence'
          git push origin "HEAD:${{ github.head_ref }}"
