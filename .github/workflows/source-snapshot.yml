name: Source snapshot

on:
  push:
    branches: [feature/canonical-resource-evidence]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Create source archive
        run: tar --exclude=.git --exclude=target -czf /tmp/smolrunner-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: smolrunner-source
          path: /tmp/smolrunner-source.tar.gz
          if-no-files-found: error
          retention-days: 1
