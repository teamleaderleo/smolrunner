name: Check Linux state read

on:
  push:
    branches: [feature/linux-state-read]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/linux-state-read
          fetch-depth: 1

      - name: Resolve, format, and capture compiler diagnostics
        shell: bash
        run: |
          set +e
          cargo check --all-targets --all-features --message-format=short > .linux-state-check.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> .linux-state-check.txt
          cargo fmt --all
          rm -f \
            .github/workflows/check-linux-state-read.yml \
            .tmp/check-linux-state-read
          rmdir .tmp 2>/dev/null || true
          git diff --check
          exit 0

      - name: Commit resolved branch
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'build: resolve and check Linux state reader'
          git push origin HEAD:feature/linux-state-read
