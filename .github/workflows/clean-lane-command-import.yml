name: Clean typed lane command import

on:
  push:
    branches: [feature/typed-lane-commands]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/typed-lane-commands
          fetch-depth: 1

      - name: Remove duplicate and update docs
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/lane_command.rs')
          text = path.read_text(encoding='utf-8')
          duplicate = '    use crate::process::CommandValue;\n    use crate::process::CommandValue;\n'
          if text.count(duplicate) != 1:
              raise SystemExit('duplicate CommandValue import did not match exactly once')
          text = text.replace(duplicate, '    use crate::process::CommandValue;\n')
          old = '    /// Returns an error for UID zero, unsafe names, or noncanonical absolute home paths.\n'
          new = '    /// Returns an error for UID or primary GID zero, unsafe names, or noncanonical absolute home paths.\n'
          if text.count(old) != 1:
              raise SystemExit('runner context documentation did not match exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          cargo fmt --all
          rm -f \
            .github/workflows/clean-lane-command-import.yml \
            .tmp/clean-lane-command-import
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit clean source
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style: clean typed lane command module'
          git push origin HEAD:feature/typed-lane-commands
