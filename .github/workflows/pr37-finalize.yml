name: PR 37 finalize

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/installation-catalog-lookup
          fetch-depth: 1

      - name: Apply the exact Clippy fix
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/linux_installation_catalog.rs")
          text = path.read_text(encoding="utf-8")
          old = "use crate::state_store::{StateRecord, StateStore, StateStoreErrorKind};"
          new = "use crate::state_store::{StateRecord, StateStoreErrorKind};"
          if text.count(old) != 1:
              raise SystemExit("expected exactly one unused StateStore import")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm .github/workflows/pr37-clippy-diagnostic.yml
          rustfmt --edition 2024 src/linux_installation_catalog.rs
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' '.github/workflows/pr37-clippy-diagnostic.yml' 'src/linux_installation_catalog.rs' | sort)"
          test "$changed" = "$expected"
          git diff --check

      - name: Commit the bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: remove unused catalog test import'
          git push origin HEAD:feature/installation-catalog-lookup
