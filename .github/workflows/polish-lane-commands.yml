name: Polish typed lane commands

on:
  push:
    branches: [feature/typed-lane-commands]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/typed-lane-commands
          fetch-depth: 1

      - name: Apply bounded review fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/lane_command.rs')
          text = path.read_text(encoding='utf-8')

          replacements = {
              '        if uid == 0 {': '        if uid == 0 || primary_gid == 0 {',
              '                "runner-user UID must be greater than zero",': '                "runner-user UID and primary GID must be greater than zero",',
              '    use crate::journal::{ExecutionLane, PlannedMutation, Preconditions, RollbackClass};\n': '    use crate::journal::{ExecutionLane, PlannedMutation, Preconditions, RollbackClass};\n    use crate::process::CommandValue;\n',
              '        RunnerUserContext::new(account("project-runner"), 0, 0, "/srv/runner")\n            .expect_err("root runner user must fail");\n': '        RunnerUserContext::new(account("project-runner"), 0, 1001, "/srv/runner")\n            .expect_err("root runner user must fail");\n        RunnerUserContext::new(account("project-runner"), 1001, 0, "/srv/runner")\n            .expect_err("root primary group must fail");\n',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected exactly one match for: {old!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

          cargo fmt --all
          rm -f \
            .github/workflows/polish-lane-commands.yml \
            .tmp/polish-lane-commands \
            .tmp/polish-lane-commands-2
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit polished source
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'fix: tighten typed lane command validation'
          git push origin HEAD:feature/typed-lane-commands
