name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

      - name: Exercise machine-readable doctor output
        run: cargo run --locked --quiet -- --output json doctor

      - name: Validate reference plans
        run: |
          cargo run --locked --quiet -- plan --file examples/quarry.yml
          cargo run --locked --quiet -- --output json plan --file examples/glossless.yml \
            | jq -e '.schema_version == 1 and (.actions | length == 4)'

      - name: Exercise read-only host planning
        run: |
          cargo run --locked --quiet -- --output json host plan --file examples/quarry.yml \
            | jq -e '.schema_version == 1 and (.actions | length >= 2)'
