name: Verify

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Apply compiler-guided corrections
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          resource = Path('src/resource.rs')
          text = resource.read_text()
          start = text.index('        let evidence = runner_id.map_or_else(')
          end = text.index('        Ok(Self::new(', start)
          replacement = '''        let evidence = match runner_id {
              Some(id) => ResourceEvidence::both(format!("github-runner:{id}"), fingerprint),
              None => ResourceEvidence::fingerprint(fingerprint),
          };
'''
          resource.write_text(text[:start] + replacement + text[end:])

          ownership = Path('src/ownership.rs')
          text = ownership.read_text()
          old = 'ResourceIdentity::github_runner_registration(scope, "project-vps", 42)'
          new = 'ResourceIdentity::github_runner_registration(scope.clone(), "project-vps", 42)'
          if old not in text:
              raise SystemExit('ownership expression not found')
          ownership.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          tar -czf /tmp/canonical-corrected.tar.gz src/resource.rs src/ownership.rs

      - name: Upload corrected source
        uses: actions/upload-artifact@v4
        with:
          name: canonical-corrected
          path: /tmp/canonical-corrected.tar.gz
          if-no-files-found: error
          retention-days: 1
