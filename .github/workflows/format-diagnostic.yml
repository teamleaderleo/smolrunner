name: Format diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fetch merge commit quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init --quiet
          git -c "http.extraheader=AUTHORIZATION: bearer $GH_TOKEN" \
            fetch --quiet --depth=1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" "$GITHUB_SHA"
          git checkout --quiet FETCH_HEAD

      - name: Print formatter changes
        shell: bash
        run: |
          set -Eeuo pipefail
          cargo fmt --all
          git diff -- src
          git diff --quiet -- src
