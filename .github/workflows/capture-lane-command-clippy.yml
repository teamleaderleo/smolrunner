name: Capture typed lane command Clippy

on:
  push:
    branches: [feature/typed-lane-commands]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/typed-lane-commands
          fetch-depth: 1

      - name: Capture short diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --locked --all-targets --all-features --message-format=short -- -D warnings > .lane-command-clippy.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> .lane-command-clippy.txt
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          rm .github/workflows/capture-lane-command-clippy.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore: capture typed lane command Clippy diagnostics'
          git push origin HEAD:feature/typed-lane-commands
