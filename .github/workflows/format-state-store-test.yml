name: Format state store test

on:
  push:
    branches: [feature/state-store-contract]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/state-store-contract
          fetch-depth: 1

      - name: Format exact source
        shell: bash
        run: |
          set -Eeuo pipefail
          cargo fmt --all
          rm -f \
            .github/workflows/format-state-store-test.yml \
            .tmp/format-state-store-test
          rmdir .tmp 2>/dev/null || true
          git diff --check

      - name: Commit formatted source
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style: format external state store test'
          git push origin HEAD:feature/state-store-contract
