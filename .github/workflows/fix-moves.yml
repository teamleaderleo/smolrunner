name: Apply move fixes once

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.head_ref }}

      - name: Apply compiler-guided fixes and remove helper
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          resource = Path('src/resource.rs')
          text = resource.read_text()
          old = '''        let evidence = runner_id.map_or_else(
              || ResourceEvidence::fingerprint(fingerprint.clone()),
              |id| ResourceEvidence::both(format!("github-runner:{id}"), fingerprint),
          );'''
          new = '''        let evidence = match runner_id {
              Some(id) => ResourceEvidence::both(format!("github-runner:{id}"), fingerprint),
              None => ResourceEvidence::fingerprint(fingerprint),
          };'''
          if old not in text:
              raise SystemExit('resource replacement target not found')
          resource.write_text(text.replace(old, new, 1))

          ownership = Path('src/ownership.rs')
          text = ownership.read_text()
          old = '''                    ResourceIdentity::github_runner_registration(scope, "project-vps", 42)
                          .expect("registration");'''
          new = '''                    ResourceIdentity::github_runner_registration(
                          scope.clone(),
                          "project-vps",
                          42,
                      )
                      .expect("registration");'''
          if old not in text:
              raise SystemExit('ownership replacement target not found')
          ownership.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          rm .github/workflows/fix-moves.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: resolve canonical evidence ownership moves'
          git push origin "HEAD:${{ github.head_ref }}"
