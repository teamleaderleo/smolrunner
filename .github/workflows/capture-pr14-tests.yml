name: Capture PR 14 test diagnostics

on:
  pull_request:
    types: [synchronize]
    paths:
      - src/resource.rs
      - src/ownership.rs
      - .github/workflows/capture-pr14-tests.yml

permissions:
  contents: write

jobs:
  capture:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/canonical-resource-evidence'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact head branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Capture bounded test output and remove this workflow
        shell: bash
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -Eeuo pipefail
          mkdir -p .tmp
          set +e
          cargo test --locked --all-targets --all-features -- --nocapture \
            > .tmp/pr14-tests.txt 2>&1
          status=$?
          set -e
          printf '\nexit_status=%s\n' "$status" >> .tmp/pr14-tests.txt
          rm -f .github/workflows/capture-pr14-tests.yml
          git diff --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A -- .tmp/pr14-tests.txt .github/workflows/capture-pr14-tests.yml
          git commit -m 'chore: capture PR 14 test diagnostics'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
