name: PR 41 staging guard

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/atomic-installation-publication
          fetch-depth: 1

      - name: Arm cleanup immediately after staging mkdir
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/linux_installation_publication.rs")
          text = path.read_text(encoding="utf-8")
          start = text.index("fn create_staged_installation")
          end = text.index("\nfn create_empty_directory", start)
          block = text[start:end]

          first_old = """        Ok(()) => {
                      let directory = fs::openat(
          """
          first_new = """        Ok(()) => {
                      let name = installation_id.as_str().to_owned();
                      let mut guard = CreatedDirectory::new(staging, name.clone());
                      let directory = fs::openat(
          """
          second_old = """            synchronize_borrowed_directory(staging, "installation staging directory")?;
                      Ok(StagedInstallation {
          """
          second_new = """            synchronize_borrowed_directory(staging, "installation staging directory")?;
                      guard.disarm();
                      Ok(StagedInstallation {
          """
          third_old = "                name: installation_id.as_str().to_owned(),"
          third_new = "                name,"

          if block.count(first_old) != 1:
              raise SystemExit("expected one staged mkdir opening")
          if block.count(second_old) != 1:
              raise SystemExit("expected one staged synchronization point")
          if block.count(third_old) != 1:
              raise SystemExit("expected one staged name field")

          block = block.replace(first_old, first_new, 1)
          block = block.replace(second_old, second_new, 1)
          block = block.replace(third_old, third_new, 1)
          path.write_text(text[:start] + block + text[end:], encoding="utf-8")
          PY
          rustfmt --edition 2024 src/linux_installation_publication.rs
          test "$(git diff --name-only)" = "src/linux_installation_publication.rs"
          git diff --check

      - name: Commit the bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/linux_installation_publication.rs
          git commit -m 'fix: guard staged installation creation'
          git push origin HEAD:feature/atomic-installation-publication
