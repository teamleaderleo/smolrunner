name: PR 41 staging guard

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/atomic-installation-publication
          fetch-depth: 1

      - name: Arm cleanup immediately after staging mkdir
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/linux_installation_publication.rs")
          text = path.read_text(encoding="utf-8")
          start = text.index("fn create_staged_installation")
          end = text.index("\nfn create_empty_directory", start)
          prefix = text[:start]
          lines = text[start:end].splitlines()
          suffix = text[end:]

          directory_line = next(
              index
              for index, line in enumerate(lines)
              if line.strip() == "let directory = fs::openat("
          )
          if lines[directory_line - 1].strip() != "Ok(()) => {":
              raise SystemExit("staged directory opening is not in the expected success arm")
          indent = lines[directory_line][: len(lines[directory_line]) - len(lines[directory_line].lstrip())]
          lines[directory_line:directory_line] = [
              f"{indent}let name = installation_id.as_str().to_owned();",
              f"{indent}let mut guard = CreatedDirectory::new(staging, name.clone());",
          ]

          sync_line = next(
              index
              for index, line in enumerate(lines)
              if line.strip()
              == 'synchronize_borrowed_directory(staging, "installation staging directory")?;'
          )
          sync_indent = lines[sync_line][: len(lines[sync_line]) - len(lines[sync_line].lstrip())]
          lines.insert(sync_line + 1, f"{sync_indent}guard.disarm();")

          name_line = next(
              index
              for index, line in enumerate(lines)
              if line.strip() == "name: installation_id.as_str().to_owned(),"
          )
          field_indent = lines[name_line][: len(lines[name_line]) - len(lines[name_line].lstrip())]
          lines[name_line] = f"{field_indent}name,"

          updated = prefix + "\n".join(lines) + suffix
          path.write_text(updated, encoding="utf-8")
          PY
          rustfmt --edition 2024 src/linux_installation_publication.rs
          test "$(git diff --name-only)" = "src/linux_installation_publication.rs"
          git diff --check

      - name: Commit the bounded correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/linux_installation_publication.rs
          git commit -m 'fix: guard staged installation creation'
          git push origin HEAD:feature/atomic-installation-publication
